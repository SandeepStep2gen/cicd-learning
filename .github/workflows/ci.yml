name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  APP_NAME: CicdLearning          # available to ALL jobs
  DOTNET_ENVIRONMENT: CI          # tells .NET we're in CI environment

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      MY_SECRET: ${{ secrets.MY_FIRST_SECRET }}   # ← using the secret
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Print secret (to see masking)
        run: echo "My secret is $MY_SECRET"

      - name: Run tests
        run: dotnet test